services:
  frp-manager-lite:
    image: ghcr.io/bohu-t/frp-manager-lite:latest
    pull_policy: always
    container_name: frp-manager-lite
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      FML_HOST: 0.0.0.0
      FML_PORT: 8080
      FML_DB: /data/data.sqlite3
    ports:
      - "${FML_PUBLISH_BIND:-127.0.0.1}:${FML_PUBLISH_PORT:-18081}:8080"
    volumes:
      - frp-manager-lite-data:/data
      - /etc/machine-id:/host/machine-id:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/nodes', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  frp-manager-lite-data:
